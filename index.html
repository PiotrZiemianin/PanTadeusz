<!DOCTYPE html>
<html lang="pl-PL">
<head>
    <meta charset="UTF-8">
    <title>Pan Tadeusz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <header class="bg-primary text-white text-center py-4">
        <h1>Pan Tadeusz</h1>
    </header>

    <div class="container-fluid flex-grow-1 mt-4 mb-5">
        <div class="row">
            <aside class="col-md-3 bg-light p-3">
                <h4 class="text-center">Spis treści</h4>
                <div class="nav flex-column nav-pills" id="toc">
                    <a class="nav-link" href="index.html">Strona główna</a>
                </div>
            </aside>

            <main class="col-md-9">
                <h2 class="text-center">Strona główna</h2>
                <img src="Pan_Tadeusz.png" class="img-fluid mt-3" alt="Pan Tadeusz">
            </main>
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <p class="mb-0">Wykonał: <strong>Piotr Ziemianin</strong></p>
    </footer>
    <script type="text/javascript">
        for (let i=1;i<13;i++){
            let a  = document.createElement('a');
            a.href = "./index.html?k="+i;
            a.className = "nav-link"
            a.innerHTML = "Księga "+i;
            document.getElementById('toc').appendChild(a);
        }
        const current = window.location.href;
        document.querySelectorAll("#toc > a").forEach(function(elem){
            if(elem.href === current){
                elem.classList.add("active");
            }
        })
    </script>
</body>
</html>
